name: matrix configuration
on:
  workflow_dispatch:
jobs:
  deploy:
    
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 2

      matrix:
        os: [ubuntu-latest, ubuntu-22.04, windows-latest]
        images: [hello-world, alpine]
        exclude:
          - os: windows-latest
            images: alpine
        include:
          - os: ubuntu-22.04
            images: amd64/alpine
    steps:
      - name: Echo Docker Details
        run: docker info
      - name: Run Image on ${{ matrix.os }}
        run: docker run ${{ matrix.images }}