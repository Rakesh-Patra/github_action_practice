name: Deploy Existing Docker Image with Variables

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      CONTAINER_REGISTRY: docker.io
      DOCKER_USERNAME: siddharth1
      IMAGE_NAME: github-actions-nginx
      IMAGE_TAG: latest

    steps:
      - name: Pull Image
        run: |
          docker pull $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG

      - name: Run Container
        run: |
          docker run -d -p 8080:80 \
            $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:$IMAGE_TAG