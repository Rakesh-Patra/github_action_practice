name: Exploring Variables and Secrets

on:
  workflow_dispatch:
    #push
    


env:
  CONTAINER_REGISTRY: docker.io
  DOCKER_USERNAME: trainwithshubham
  IMAGE_NAME: gemininip

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Build
        run: |
          docker build -t $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest .

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            --username $DOCKER_USERNAME \
            --password-stdin

      - name: Docker Publish
        run: |
          docker push $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest

  deploy:
    needs: docker
    concurrency:
      group: production 
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Pull from Docker Hub
        run: |
          docker pull $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest

      - name: Docker Run
        run: |
          docker run -d -p 8080:80 \
            $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest